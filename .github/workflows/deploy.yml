name: Deploy to DO002

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}

      - name: Create .env file
        env:
          FUTU_ACCOUNT_ID: ${{ secrets.FUTU_ACCOUNT_ID }}
          FUTU_ACCOUNT_PWD: ${{ secrets.FUTU_ACCOUNT_PWD }}
        run: |
          cat > .env << 'EOF'
          FUTU_ACCOUNT_ID=${FUTU_ACCOUNT_ID}
          FUTU_ACCOUNT_PWD=${FUTU_ACCOUNT_PWD}
          EOF

      - name: Create service_account.json on remote
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" | base64 -d > service_account.json

      - name: Deploy to DO002
        env:
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          # Create directory on remote
          ssh -o StrictHostKeyChecking=no root@$SSH_HOST "mkdir -p /opt/loading-futu-automation"

          # Copy files to remote (exclude .git and secrets)
          rsync -avz --exclude='.git' --exclude='.secrets' --exclude='.env' --exclude='service_account.json' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ root@$SSH_HOST:/opt/loading-futu-automation/

          # Copy .env file
          scp -o StrictHostKeyChecking=no .env root@$SSH_HOST:/opt/loading-futu-automation/

          # Copy service_account.json
          scp -o StrictHostKeyChecking=no service_account.json root@$SSH_HOST:/opt/loading-futu-automation/OptionPython/service_account.json

      - name: Start containers on remote
        env:
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no root@$SSH_HOST << 'ENDSSH'
            set -e
            cd /opt/loading-futu-automation

            # Stop and remove existing containers
            docker rm -f futu-opend option-python 2>/dev/null || true

            # Pull latest futu-opend image
            docker pull manhinhang/futu-opend-docker:ubuntu-stable

            # Start futu-opend
            docker run -d \
              --name futu-opend \
              --restart unless-stopped \
              --env-file .env \
              -v /opt/loading-futu-automation/futu.pem:/.futu/futu.pem:ro \
              -v futu-opend-data:/.futu \
              -p 11111:11111 \
              manhinhang/futu-opend-docker:ubuntu-stable

            # Wait for futu-opend to be ready
            sleep 5

            # Build and start option-python
            docker build -t option-python ./OptionPython
            docker run -d \
              --name option-python \
              --restart unless-stopped \
              --env-file .env \
              --link futu-opend \
              -v /opt/loading-futu-automation/OptionPython/service_account.json:/app/service_account.json:ro \
              option-python

            # Show status
            docker ps --filter "name=futu-opend" --filter "name=option-python"
          ENDSSH

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no root@$SSH_HOST "docker ps --filter 'name=futu-opend' --filter 'name=option-python'"
