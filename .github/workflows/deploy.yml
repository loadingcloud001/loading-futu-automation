name: Deploy to DO002

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy files to DO002
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DO002_HOST }}
          username: root
          key: ${{ secrets.DO002_SSH_KEY }}
          source: "OptionPython/,docker-compose.yml,FutuOpenD.xml,futu.pem"
          target: "/opt/loading-futu-automation"
          strip_components: 0

      - name: Deploy to DO002
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DO002_HOST }}
          username: root
          key: ${{ secrets.DO002_SSH_KEY }}
          envs:
            - FUTU_ACCOUNT_ID
            - FUTU_ACCOUNT_PWD
          script: |
            set -e
            
            echo "=== Creating directories ==="
            mkdir -p /opt/loading-futu-automation/OptionPython
            
            echo "=== Creating .env file ==="
            cd /opt/loading-futu-automation
            printf 'FUTU_ACCOUNT_ID=%s\nFUTU_ACCOUNT_PWD=%s\nFUTU_OPEND_IP=futu-opend\nFUTU_OPEND_PORT=11111\nFUTU_RSA_FILE_PATH=/.futu/futu.pem\nSERVICE_FILE=/app/service_account.json\nSHEET_NAME=LID Risk Management\nWORKSHEET_TITLE=Today\nTARGET_HOUR=04\nTARGET_MINUTE=00\n' "$FUTU_ACCOUNT_ID" "$FUTU_ACCOUNT_PWD" > .env
            
            echo "=== Checking futu-opend status ==="
            if docker ps --filter name=futu-opend --format '{{.Names}}' | grep -q futu-opend; then
              if docker logs futu-opend 2>&1 | grep -q '登录成功'; then
                echo "futu-opend is already running and logged in - will NOT restart"
                FUTU_SKIP=true
              else
                echo "futu-opend exists but not logged in - will restart"
                FUTU_SKIP=false
              fi
            else
              echo "futu-opend does not exist - will create"
              FUTU_SKIP=false
            fi
            
            if [ "$FUTU_SKIP" = "false" ]; then
              echo "=== Stopping existing futu-opend ==="
              docker rm -f futu-opend 2>/dev/null || true
              
              echo "=== Pulling futu-opend image ==="
              docker pull manhinhang/futu-opend-docker:ubuntu-stable
              
              echo "=== Creating futu-opend container ==="
              docker compose up -d futu-opend
              echo "Waiting 30s for futu-opend to start..."
              sleep 30
            else
              echo "Skipping futu-opend (already running and logged in)"
            fi
            
            echo "=== Creating service account placeholder ==="
            echo '{}' > /opt/loading-futu-automation/OptionPython/service_account.json
            
            echo "=== Building option-python ==="
            docker compose build option-python
            
            echo "=== Starting option-python ==="
            docker compose up -d option-python
            
            echo "=== Docker Containers ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            
            echo "=== FutuOpenD Logs ==="
            docker logs futu-opend 2>&1 | tail -10 || echo "No logs available"
            
            echo "=== OptionPython Logs ==="
            docker logs option-python 2>&1 | tail -20 || echo "option-python not available"

      - name: Verify deployment
        run: |
          echo "Deployment step completed. Check logs above for status."
