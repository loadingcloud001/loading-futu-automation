name: Deploy to DO002

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DO002
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DO002_HOST }}
          username: root
          key: ${{ secrets.DO002_SSH_KEY }}
          envs:
            - FUTU_ACCOUNT_ID
            - FUTU_ACCOUNT_PWD
          script: |
            set -e
            cd /opt/loading-futu-automation
            printf 'FUTU_ACCOUNT_ID=%s\nFUTU_ACCOUNT_PWD=%s\nFUTU_OPEND_IP=futu-opend\nFUTU_OPEND_PORT=11111\n' "$FUTU_ACCOUNT_ID" "$FUTU_ACCOUNT_PWD" > .env
            docker compose up -d --no-deps option-python
            docker ps --format 'table {{.Names}}\t{{.Status}}'
