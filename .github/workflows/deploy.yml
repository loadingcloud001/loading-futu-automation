name: Deploy to DO002

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DO002_SSH_KEY }}
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        env:
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=10 root@$SSH_HOST "echo 'SSH connection successful' && hostname"

      - name: Create .env file
        env:
          FUTU_ACCOUNT_ID: ${{ secrets.FUTU_ACCOUNT_ID }}
          FUTU_ACCOUNT_PWD: ${{ secrets.FUTU_ACCOUNT_PWD }}
        run: |
          echo "FUTU_ACCOUNT_ID=$FUTU_ACCOUNT_ID" > .env
          echo "FUTU_ACCOUNT_PWD=$FUTU_ACCOUNT_PWD" >> .env
          echo "FUTU_OPEND_IP=0.0.0.0" >> .env
          echo "FUTU_OPEND_PORT=11111" >> .env
          echo "FUTU_RSA_FILE_PATH=/.futu/futu.pem" >> .env
          echo "SERVICE_FILE=/app/service_account.json" >> .env
          echo "SHEET_NAME=LID Risk Management" >> .env
          echo "WORKSHEET_TITLE=Today" >> .env
          echo "TARGET_HOUR=04" >> .env
          echo "TARGET_MINUTE=00" >> .env
          cat .env

      - name: Create setup script
        run: |
          cat > /tmp/setup-docker.sh << 'SCRIPT'
#!/bin/bash
set -e
if ! command -v docker &> /dev/null; then
  echo "Installing Docker..."
  apt-get update
  apt-get install -y ca-certificates curl gnupg lsb-release
  mkdir -p /etc/apt/keyrings
  curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  apt-get update
  apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  systemctl enable docker
  systemctl start docker
  echo "Docker installed successfully"
else
  echo "Docker already installed"
fi
SCRIPT
          chmod +x /tmp/setup-docker.sh

      - name: Install Docker on DO002 (if needed)
        env:
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no /tmp/setup-docker.sh root@$SSH_HOST:/tmp/
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@$SSH_HOST "/tmp/setup-docker.sh"

      - name: Deploy to DO002
        env:
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@$SSH_HOST "mkdir -p /opt/loading-futu-automation"
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no docker-compose.yml .env FutuOpenD.xml futu.pem root@$SSH_HOST:/opt/loading-futu-automation/

      - name: Pull futu-opend image
        env:
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@$SSH_HOST "docker pull manhinhang/futu-opend-docker:ubuntu-stable"

      - name: Start futu-opend container
        env:
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@$SSH_HOST "docker rm -f futu-opend 2>/dev/null || true"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@$SSH_HOST "docker volume create futu-opend-data 2>/dev/null || true"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@$SSH_HOST "cd /opt/loading-futu-automation && docker compose up -d"

      - name: Wait for futu-opend to be ready
        env:
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          echo "Waiting for futu-opend to start..."
          sleep 30
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@$SSH_HOST "docker logs futu-opend 2>&1 | tail -30"

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.DO002_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@$SSH_HOST "docker ps --filter name=futu-opend --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@$SSH_HOST "docker logs futu-opend 2>&1 | tail -50"
