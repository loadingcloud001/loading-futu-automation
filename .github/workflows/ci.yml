name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose

      - name: Validate docker-compose
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "docker-compose.yml is valid"

      - name: Check required files exist
        run: |
          ls -la FutuOpenD.xml futu.pem OptionPython/Dockerfile OptionPython/app.py OptionPython/requirements.txt
