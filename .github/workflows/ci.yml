name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate docker compose
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "docker-compose.yml is valid"

      - name: Check required files exist
        run: |
          ls -la FutuOpenD.xml futu.pem OptionPython/Dockerfile OptionPython/app.py OptionPython/requirements.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile OptionPython/app.py
          echo "Python syntax is valid"

      - name: Check retry configuration
        run: |
          echo "Validating retry environment variables in docker-compose.yml..."
          grep -q "RETRY_MAX_ATTEMPTS=3" docker-compose.yml && echo "✓ RETRY_MAX_ATTEMPTS configured"
          grep -q "RETRY_INITIAL_DELAY=30" docker-compose.yml && echo "✓ RETRY_INITIAL_DELAY configured"
          grep -q "RETRY_MAX_DELAY=3600" docker-compose.yml && echo "✓ RETRY_MAX_DELAY configured"

      - name: Check phone verification block detection
        run: |
          echo "Validating phone verification block detection in app.py..."
          grep -q "PHONE_VERIFY_BLOCK_KEYWORDS" OptionPython/app.py && echo "✓ Block keywords defined"
          grep -q "is_phone_verification_blocked" OptionPython/app.py && echo "✓ Block detection function exists"
          grep -q "exponential_backoff_retry" OptionPython/app.py && echo "✓ Exponential backoff function exists"

      - name: Check for leaked secrets
        run: |
          echo "Scanning for potential leaked secrets..."
          if grep -rE "ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{20,}" . --include="*.yml" --include="*.yaml" --include="*.env" 2>/dev/null; then
            echo "ERROR: Potential GitHub token found in code!"
            exit 1
          fi
          echo "✓ No leaked secrets detected"