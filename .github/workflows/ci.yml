name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate docker compose
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "docker-compose.yml is valid"

      - name: Check required files exist
        run: |
          ls -la OptionPython/Dockerfile OptionPython/app.py OptionPython/requirements.txt OptionPython/20241205stocklist.csv

      - name: Validate all Python syntax
        run: |
          for f in OptionPython/*.py; do
            python -m py_compile "$f" && echo "✓ $f"
          done

      - name: Check for leaked secrets
        run: |
          echo "Scanning for potential leaked secrets..."
          if grep -rE "ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{20,}" . --include="*.yml" --include="*.yaml" 2>/dev/null; then
            echo "ERROR: Potential GitHub token found in code!"
            exit 1
          fi
          echo "✓ No leaked secrets detected"
