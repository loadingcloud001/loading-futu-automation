services:
  futu-opend:
    image: manhinhang/futu-opend-docker:ubuntu-stable
    container_name: futu-opend
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - FUTU_ACCOUNT_ID=${FUTU_ACCOUNT_ID}
      - FUTU_ACCOUNT_PWD=${FUTU_ACCOUNT_PWD}
      - FUTU_OPEND_IP=0.0.0.0
      - FUTU_OPEND_PORT=11111
      - FUTU_OPEND_RSA_FILE_PATH=
      - FUTU_OPEND_TELNET_PORT=22222
    volumes:
      - ./start.sh:/bin/start.sh:rw
      - futu-opend-data:/.futu
    ports:
      - "11111:11111"
      - "22222:22222"
    networks:
      - futu-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

  option-python:
    build:
      context: ./OptionPython
      dockerfile: Dockerfile
    container_name: option-python
    restart: unless-stopped
    environment:
      - FUTU_OPEND_IP=futu-opend
      - FUTU_OPEND_PORT=11111
      - FUTU_RSA_FILE_PATH=
      - SERVICE_FILE=/app/service_account.json
      - SHEET_NAME=LID Risk Management
      - WORKSHEET_TITLE=Today
      - TARGET_HOUR=04
      - TARGET_MINUTE=00
    volumes:
      - ./futu.pem:/.futu/futu.pem:ro
      - ./OptionPython/service_account.json:/app/service_account.json:ro
      - ./OptionPython/20241205stocklist.csv:/app/20241205stocklist.csv:ro
    depends_on:
      - futu-opend
    networks:
      - futu-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3

networks:
  futu-net:

volumes:
  futu-opend-data:
