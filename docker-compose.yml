services:
  futu-opend:
    image: manhinhang/futu-opend-docker:ubuntu-stable
    container_name: futu-opend
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - FUTU_ACCOUNT_ID=${FUTU_ACCOUNT_ID}
      - FUTU_ACCOUNT_PWD=${FUTU_ACCOUNT_PWD}
      - FUTU_OPEND_IP=0.0.0.0
      - FUTU_OPEND_PORT=11111
      - FUTU_OPEND_RSA_FILE_PATH=/.futu/futu.pem
    volumes:
      - ./futu.pem:/.futu/futu.pem:ro
      - futu-opend-data:/.futu
    ports:
      - "11111:11111"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11111"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  futu-opend-data:
